name: LX32 Toolchain CI

on:
  workflow_dispatch:
  push:
    branches: ["refactor/portability", "exp/**"]
    paths:
      - "Dockerfile"
      - "Dockerfile.runtime"
      - ".dockerignore"
      - ".github/workflows/backend-toolchain.yml"
      - "tools/lx32_backend/**"
  pull_request:
    branches: ["refactor/portability"]
    paths:
      - "Dockerfile"
      - "Dockerfile.runtime"
      - ".dockerignore"
      - ".github/workflows/backend-toolchain.yml"
      - "tools/lx32_backend/**"

permissions:
  contents: read
  packages: write

env:
  # Keep CI deterministic: avoid drift from a moving LLVM main branch.
  LLVM_REF_PIN: 1124aa5a463f0d88df752564ca79023d0f690e60

jobs:
  build-toolchain:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect runner cores
        id: cores
        run: echo "jobs=$(nproc)" >> "$GITHUB_OUTPUT"

      - name: Compute backend hash
        id: backend_hash
        run: |
          set -euo pipefail
          echo "value=$(find tools/lx32_backend -type f | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Preflight Docker context
        run: |
          set -euo pipefail
          pwd
          ls -la
          test -f Dockerfile

      - name: Build runtime image with pinned toolchain
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runtime
          tags: lx32-runtime-ci:${{ github.sha }}
          load: true
          build-args: |
            LLVM_REF=${{ env.LLVM_REF_PIN }}
            BACKEND_COMMIT=${{ github.sha }}
            BACKEND_HASH=${{ steps.backend_hash.outputs.value }}
            LLVM_JOBS=${{ steps.cores.outputs.jobs }}
          cache-from: type=gha,scope=lx32-runtime-base
          cache-to: type=gha,mode=max,scope=lx32-runtime-base

      - name: Backend smoke preflight (llc + SelectionDAG)
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            lx32-runtime-ci:${GITHUB_SHA} \
            /bin/bash -lc '
              set -euo pipefail
              /usr/local/bin/llc --version
              tools/lx32_backend/tests/run_smoke.sh /usr/local/bin/llc
            '

      - name: Backend deep baremetal preflight
        continue-on-error: true
        run: |
          set -euo pipefail
          docker run --rm \
            -e EXPECTED_BACKEND_COMMIT="${GITHUB_SHA}" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            lx32-runtime-ci:${GITHUB_SHA} \
            /bin/bash -lc '
              set -euo pipefail
              test "$(cat /usr/local/share/LX32_BACKEND_COMMIT)" = "${EXPECTED_BACKEND_COMMIT}"
              LX32_LLVM_BIN=/usr/local/bin tools/lx32_backend/tests/baremetal/run_baremetal_smoke.sh deep
            '

      - name: Extract versioned toolchain payload
        run: |
          set -euo pipefail
          mkdir -p dist/bin dist/lib
          cid="$(docker create lx32-runtime-ci:${GITHUB_SHA})"
          docker cp "${cid}:/usr/local/bin/llc" dist/bin/
          docker cp "${cid}:/usr/local/bin/llvm-mc" dist/bin/
          docker cp "${cid}:/usr/local/bin/llvm-objcopy" dist/bin/
          # ld.lld is a symlink in Ubuntu; copy the resolved binary target.
          ld_real="$(docker run --rm lx32-runtime-ci:${GITHUB_SHA} /bin/sh -lc 'readlink -f /usr/bin/ld.lld')"
          docker cp "${cid}:${ld_real}" dist/bin/ld.lld
          docker cp "${cid}:/usr/local/lib/lx32-llvm" dist/lib/
          docker cp "${cid}:/usr/local/share/LX32_BACKEND_COMMIT" dist/
          docker rm -v "${cid}"

          find dist/bin -type f -exec chmod +x {} +
          tar -C dist -czf "lx32-toolchain-${GITHUB_SHA}-linux-amd64.tar.gz" .

      - name: Upload commit-versioned artifact
        uses: actions/upload-artifact@v4
        with:
          name: lx32-toolchain-${{ github.sha }}-linux-amd64
          path: lx32-toolchain-${{ github.sha }}-linux-amd64.tar.gz
          retention-days: 30

  build-runtime-image:
    runs-on: ubuntu-24.04
    needs: build-toolchain
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'refactor/portability'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner (lowercase)
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Download toolchain artifact
        uses: actions/download-artifact@v4
        with:
          name: lx32-toolchain-${{ github.sha }}-linux-amd64
          path: artifact

      - name: Expand toolchain payload for runtime image
        run: |
          set -euo pipefail
          mkdir -p toolchain
          tar -xzf artifact/lx32-toolchain-${GITHUB_SHA}-linux-amd64.tar.gz -C toolchain

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image that consumes the artifact payload
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/lx32-runtime:${{ github.sha }}
          push: true
          cache-from: type=gha,scope=lx32-runtime-publish
          cache-to: type=gha,mode=max,scope=lx32-runtime-publish

      - name: Tag latest on portability branch
        if: github.ref_name == 'refactor/portability'
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ steps.owner.outputs.value }}/lx32-runtime"
          docker pull "${IMAGE}:${GITHUB_SHA}"
          docker tag "${IMAGE}:${GITHUB_SHA}" "${IMAGE}:latest"
          docker push "${IMAGE}:latest"

